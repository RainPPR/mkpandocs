site_name: MkPandocs
site_url: https://rainppr.github.io/mkpandocs/
site_description: 使用 Pandoc 渲染的项目文档生成器。
site_author: RainPPR
repo_name: RainPPR/mkpandocs
repo_url: https://github.com/RainPPR/mkpandocs/
edit_uri: blob/master/docs/
copyright: Copyright &copy; 2026 <a href="https://github.com/RainPPR">RainPPR</a>

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/RainPPR
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/rainppr2008

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - header.autohide
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

nav:
  - 首页: index.md
  - 入门: getting-started.md
  - 用户指南:
    - 配置: user-guide/configuration.md
    - 编写文档: user-guide/writing-your-docs.md
    - 命令行: user-guide/cli.md
    - 部署: user-guide/deploying.md
    - JSON 过滤器: user-guide/json-filters.md
  - 开发指南:
    - 插件开发: dev-guide/plugins.md
    - 主题开发: dev-guide/themes.md
    - 架构: dev-guide/architecture.md

pandoc:
  format: markdown+raw_html+raw_attribute
  to: html5
  html_parser: html.parser

plugins:
  - search
  - autorefs
  - tags

watch:
  - properdocs
