site_name: MkPandocs
site_url: https://mkpandocs.raincatsoft.com/
site_description: Project documentation with Markdown.
site_author: MkPandocs Team

repo_url: https://github.com/RainPPR/mkpandocs/
edit_uri: blob/master/docs/

theme:
  name: mkdocs
  color_mode: auto
  user_color_mode_toggle: true
  locale: en
  highlightjs: true
  hljs_languages:
    - yaml
    - django

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide: user-guide/
  - Developer Guide: dev-guide/
  - About:
    - Release Notes: about/release-notes.md
    - Contributing: about/contributing.md
    - License: about/license.md
    - Who We Are: about/who-we-are.md

extra_css:
  - css/extra.css

exclude_docs: |
  *.py

copyright: Copyright &copy; 2026 <a href="https://github.com/RainPPR">Tom RainPPR</a>, Maintained by the <a href="/about/release-notes/#maintenance-team">MkPandocs Team</a>.

hooks:
  - docs/hooks.py

plugins:
  - search
  - redirects:
      redirect_maps:
        user-guide/plugins.md: dev-guide/plugins.md
        user-guide/custom-themes.md: dev-guide/themes.md
        user-guide/styling-your-docs.md: user-guide/choosing-your-theme.md
  - autorefs
  - literate-nav:
      nav_file: README.md
      implicit_index: true
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_section_style: list
            members_order: source
            show_root_heading: true
            show_source: false
            show_signature_annotations: true

watch:
  - properdocs
