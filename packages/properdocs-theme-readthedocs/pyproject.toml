[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "properdocs-theme-readthedocs"
description = "'readthedocs' theme for ProperDocs, originally made for MkDocs"
readme = "README.md"
license = "BSD-2-Clause"
authors = [
    {name = "Tom Christie", email = "tom@tomchristie.com"},
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Environment :: Web Environment",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: BSD License",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Topic :: Documentation",
    "Topic :: Text Processing",
]
dynamic = ["version"]
requires-python = ">=3.9"
dependencies = [
    "properdocs",
    "babel"
]

[project.urls]
Documentation = "https://properdocs.org/"
Source = "https://github.com/properdocs/properdocs"
Issues = "https://github.com/properdocs/properdocs/issues"

[project.entry-points."properdocs.themes"]
readthedocs = "properdocs_theme_readthedocs"

[tool.hatch.version]
path = "properdocs_theme_readthedocs/__init__.py"

[tool.hatch.build]
artifacts = ["/properdocs_theme_readthedocs/**/*.mo"]
[tool.hatch.build.targets.sdist]
include = ["/properdocs_theme_readthedocs"]
[tool.hatch.build.targets.wheel]
packages = ["properdocs_theme_readthedocs"]
exclude = ["*.po", "*.pot", "babel.cfg"]
[tool.hatch.build.hooks.custom]
dependencies = [
    "babel",
    "setuptools; python_version >= '3.12'",
]
