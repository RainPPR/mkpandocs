name: CI
on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * 6'
defaults:
  run:
    shell: bash
jobs:
  test:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: '3.14'
            os: ubuntu-latest
          - python: '3.14'
            os: windows-latest
          - python: '3.14'
            os: macos-latest
          - python: '3.13'
            os: ubuntu-latest
          - python: '3.13'
            os: windows-latest
          - python: '3.12'
            os: macos-latest
          - python: '3.12'
            os: ubuntu-latest
          - python: '3.12'
            os: windows-latest
          - python: '3.11'
            os: ubuntu-latest
          - python: '3.11'
            os: macos-latest
          - python: '3.10'
            os: windows-latest
          - python: '3.10'
            os: ubuntu-latest
            versions: minimal
    runs-on: ${{matrix.os}}
    steps:
      - name: Download source
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install Python
        run: uv python install ${{matrix.python}}
      - name: Pin to lowest versions
        if: matrix.versions == 'minimal'
        run: |
          sed -i -E 's/#min //; s/\b >=([0-9])/ ==\1/' pyproject.toml
      - name: Sync dependencies
        run: uv sync --group test
      - name: Install Pandoc
        run: uv run mkpandocs install-deps
      - name: Run tests
        run: uv run python -m unittest discover -s properdocs -p "*tests.py"

  style:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Download source
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --group style
      - name: Check with ruff
        if: always()
        run: uv run ruff check properdocs
      - name: Check with mypy
        if: always()
        run: uv run mypy properdocs

  package:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync
      - name: Build package
        run: uv build
      - name: Check packaged files
        shell: bash -e -x {0}
        run: |
          expected_wheel=(-eproperdocs/{templates/sitemap.xml,config/base.py,py.typed,contrib/search/lunr-language/lunr.nl.js})
          expected_sdist=("${expected_wheel[@]}" -epyproject.toml)
          test "$(tar -ztf dist/mkpandocs-*.tar.gz | grep -F "${expected_sdist[@]}" | tee /dev/stderr | wc -l)" -eq "${#expected_sdist[@]}"
          test "$(unzip -l dist/mkpandocs-*any.whl | grep -F "${expected_wheel[@]}" | tee /dev/stderr | wc -l)" -eq "${#expected_wheel[@]}"
